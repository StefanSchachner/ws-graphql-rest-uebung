apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-graphql-rest-uebung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-graphql-rest-uebung
  template:
    metadata:
      labels:
        app: ws-graphql-rest-uebung
    spec:
      containers:
        - name: ws-graphql-rest-uebung
          image: ghcr.io/stefanschachner/ws-graphql-rest-uebung:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ws-graphql-rest-uebung
spec:
  selector:
    app: ws-graphql-rest-uebung
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-graphql-rest-uebung
spec:
  ingressClassName: nginx
  rules:
    - host: it210200.cloud.htl-leonding.ac.at
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ws-graphql-rest-uebung
                port:
                  number: 80
